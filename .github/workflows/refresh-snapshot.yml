name: Refrescar snapshot del Mundial 2026

# Mueve la tabla y los resultados a lo largo del torneo: descarga el calendario
# y marcadores de openfootball/worldcup.json (dominio público, sin API key) y
# commitea el snapshot actualizado. Programado cada 3 horas y manual.

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:core
      - name: Refrescar snapshot (openfootball, sin API key)
        run: npm --workspace @rtm/scraper run refresh
      - name: Commit del snapshot actualizado
        run: |
          git config user.name "rtm-bot"
          git config user.email "bot@road-to-mundial.local"
          git add apps/api/data/worldcup-2026.snapshot.json
          git commit -m "chore(data): refrescar snapshot $(date -u +%FT%TZ)" || echo "Sin cambios"
          git push origin main
